name: build-mountfix
on:
  workflow_dispatch:
  push: { paths: [".github/workflows/build-mountfix.yml"] }
permissions: { contents: read, packages: write }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for h in $(ls tasks | grep '^mountfix-'); do
            echo "=== build $h ==="
            docker build -t ghcr.io/$owner/et-envs:$h "tasks/$h" && docker push ghcr.io/$owner/et-envs:$h || echo "FAIL $h"
          done
