name: build-et-images
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.s.outputs.chunks }}
    steps:
      - uses: actions/checkout@v4
      - id: s
        run: |
          total=$(ls tasks | wc -l)
          n=$(( (total + 24) / 25 ))
          echo "total=$total chunks=$n"
          echo "chunks=$(seq 0 $((n-1)) | jq -R -s -c 'split("\n")|map(select(length>0)|tonumber)')" >> "$GITHUB_OUTPUT"
  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        chunk: ${{ fromJson(needs.discover.outputs.chunks) }}
    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - run: |
          CS=25; i=${{ matrix.chunk }}
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          ids=$(ls tasks | sort | sed -n "$((i*CS+1)),$((i*CS+CS))p")
          for id in $ids; do
            if docker build -t ghcr.io/$owner/et-envs:$id "tasks/$id"; then
              docker push ghcr.io/$owner/et-envs:$id || echo "PUSHFAIL $id"
            else
              echo "BUILDFAIL $id"
            fi
          done
