name: build-et-images
on:
  push: { branches: [main] }
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      ids: ${{ steps.s.outputs.ids }}
    steps:
      - uses: actions/checkout@v4
      - id: s
        run: echo "ids=$(ls tasks | jq -R -s -c 'split("\n")|map(select(length>0))')" >> "$GITHUB_OUTPUT"
  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        id: ${{ fromJson(needs.discover.outputs.ids) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: tasks/${{ matrix.id }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/et-envs:${{ matrix.id }}
