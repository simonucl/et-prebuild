name: build-et-images
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.s.outputs.chunks }}
    steps:
      - uses: actions/checkout@v4
      - id: s
        run: |
          total=$(ls tasks | wc -l); n=$(( (total + 24) / 25 ))
          echo "chunks=$(seq 0 $((n-1)) | jq -R -s -c 'split("\n")|map(select(length>0)|tonumber)')" >> "$GITHUB_OUTPUT"
  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        chunk: ${{ fromJson(needs.discover.outputs.chunks) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - run: |
          CS=25; i=${{ matrix.chunk }}
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          for h in $(ls tasks | sort | sed -n "$((i*CS+1)),$((i*CS+CS))p"); do
            docker buildx build --tag ghcr.io/$owner/et-envs:$h \
              --cache-from type=registry,ref=ghcr.io/$owner/et-envs:buildcache \
              --cache-to type=registry,ref=ghcr.io/$owner/et-envs:buildcache,mode=max \
              --push "tasks/$h" || echo "BUILDFAIL $h"
          done
