schema_version = "1.3"

[task]
name = "simonucl/trsi-gnu-tar-incremental-ledger"
description = "Create a GNU tar full and incremental backup pair with exact excludes, source mutations, and manifest output."
keywords = ["tar", "gzip", "linux", "shell", "filesystem", "incremental-backup"]

[metadata]
difficulty = "hard"
category = "systems"
tags = ["tar", "backup", "configuration", "filesystem", "verification"]

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 120.0

[environment]
network_mode = "no-network"
cpus = 1
memory_mb = 1024
storage_mb = 4096
